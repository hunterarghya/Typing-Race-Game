<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Typing Game - Auth</title>
  </head>
  <body>
    <h1>Pro Typing Game</h1>

    <section id="register-section">
      <h2>Register</h2>
      <input type="text" id="reg-name" placeholder="Full Name" /><br />
      <input type="text" id="reg-username" placeholder="Username" /><br />
      <input type="email" id="reg-email" placeholder="Email" /><br />
      <input type="password" id="reg-password" placeholder="Password" /><br />
      <button onclick="handleRegister()">Register</button>
      <div id="reg-otp-section" style="display: none">
        <p>Enter OTP sent to email:</p>
        <input type="text" id="reg-otp" placeholder="OTP" />
        <button onclick="handleVerifyRegistration()">Verify Account</button>
      </div>
    </section>

    <hr />

    <section id="login-section">
      <h2>Login</h2>
      <input type="email" id="login-email" placeholder="Email" /> <br />
      <input type="password" id="login-password" placeholder="Password" />
      <br />

      <a href="#" onclick="toggleModal(true)">Forgot Password?</a><br /><br />

      <button onclick="handleLogin()">Login</button>
      <p>OR</p>
      <button
        onclick="window.location.href='http://localhost:10000/auth/login/google'"
      >
        Login with Google
      </button>
    </section>

    <div
      id="fp-modal"
      style="
        display: none;
        border: 1px solid black;
        padding: 20px;
        margin-top: 20px;
      "
    >
      <h3>Reset Password</h3>
      <div id="fp-step-1">
        <input type="email" id="fp-email" placeholder="Enter your email" />
        <button onclick="handleForgotPassword()">Send OTP</button>
      </div>
      <div id="fp-step-2" style="display: none">
        <input type="text" id="fp-otp" placeholder="Enter OTP" /><br />
        <input
          type="password"
          id="fp-new-password"
          placeholder="New Password"
        /><br />
        <button onclick="handleResetPassword()">Reset Password</button>
      </div>
      <button onclick="toggleModal(false)">Close</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
